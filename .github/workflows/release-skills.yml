name: Release Skills

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths:
      - "skills/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Build .skill files
        run: |
          mkdir -p dist
          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            if [ -f "${skill_dir}/skills/SKILL.md" ]; then
              echo "Packaging: ${skill_name}"
              (cd "$skill_dir" && zip -r "../../dist/${skill_name}.skill" . -x '*/.git/*')
            fi
          done
          ls -la dist/

      - name: Generate version tag
        id: version
        run: |
          VERSION="v$(date +'%Y%m%d.%H%M%S')"
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Generate release notes
        id: notes
        run: |
          {
            echo "body<<RELEASE_EOF"
            echo "## Skill Files"
            echo ""
            for skill_file in dist/*.skill; do
              skill_name=$(basename "$skill_file" .skill)
              # SKILL.md の frontmatter から description を取得
              description=$(sed -n '/^---$/,/^---$/p' "skills/${skill_name}/skills/SKILL.md" \
                | grep '^description:' \
                | sed 's/^description: *//' \
                | head -c 1000)
              echo "- **${skill_name}.skill**: ${description}"
            done
            echo ""
            echo "## How to use"
            echo ""
            echo "1. Download the \`.skill\` file"
            echo "2. Claude.ai: **Settings > Capabilities** で Code execution を有効化"
            echo "3. **Customize > Skills** で \`.skill\` ファイルをアップロード"
            echo ""
            echo "---"
            echo "Commit: ${GITHUB_SHA::7}"
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Skills ${{ steps.version.outputs.tag }}"
          body: ${{ steps.notes.outputs.body }}
          files: dist/*.skill
